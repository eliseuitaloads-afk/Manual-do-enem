<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --azul:#2563EB; --azul-esc:#1740B0; --azul-claro:#EAF1FF;
  --verde:#16A34A; --verde-esc:#12833c; --vermelho:#E11D2A;
  --tinta:#0E1A2B; --cinza:#5B6677; --linha:#E5EAF1; --fundo:#F4F8FF;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:#fff;color:var(--tinta);font-family:'Inter',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Plus Jakarta Sans',sans-serif;line-height:1.16;margin:0}
p{margin:0 0 14px}
.wrap{max-width:860px;margin:0 auto;padding:0 20px}
.kick{font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--azul);text-align:center;margin-bottom:10px}

.urg{background:var(--vermelho);color:#fff;text-align:center;font-size:14px;padding:10px;font-weight:600}
.urg b{font-variant-numeric:tabular-nums}

.cta{display:inline-block;background:var(--verde);color:#fff;text-decoration:none;font-family:'Plus Jakarta Sans';font-weight:800;font-size:18px;padding:18px 36px;border-radius:999px;box-shadow:0 10px 26px rgba(22,163,74,.32);transition:.15s;cursor:pointer;border:0}
.cta:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(22,163,74,.4)}
.badges{font-size:13.5px;color:var(--cinza);margin-top:15px}

.hero{background:linear-gradient(180deg,var(--azul-claro),#fff);padding:42px 0 44px;text-align:center}
.hero h1{font-size:35px;font-weight:800;letter-spacing:-.6px;max-width:730px;margin:0 auto 16px}
.hero h1 .az{color:var(--azul)}
.hero .sub{font-size:18px;color:var(--cinza);max-width:600px;margin:0 auto 24px}

/* caixa explicativa */
.caixa{background:#fff;border:1px solid var(--linha);border-left:5px solid var(--azul);border-radius:14px;padding:22px 24px;max-width:640px;margin:0 auto 26px;text-align:left;box-shadow:0 10px 30px rgba(14,26,43,.06)}
.caixa p{font-size:15.5px;margin:0 0 12px}
.caixa p:last-child{margin:0}
.caixa b{color:var(--tinta)}

/* mockup celular */
.device{position:relative;max-width:300px;margin:32px auto 0;display:flex;justify-content:center}
.device .glow{position:absolute;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(37,99,235,.35),transparent 65%);top:10%;left:50%;transform:translateX(-50%);filter:blur(10px);z-index:0}
.phone{position:relative;z-index:1;width:248px;background:#0A0A1F;border-radius:34px;padding:11px;box-shadow:0 30px 70px rgba(14,26,43,.35),inset 0 0 0 2px #2a2a52;border:1px solid rgba(255,255,255,.06)}
.phone::before{content:"";position:absolute;top:14px;left:50%;transform:translateX(-50%);width:80px;height:6px;background:#1b1b3a;border-radius:99px;z-index:3}
.screen{background:#0A0A1F;border-radius:24px;overflow:hidden;padding:26px 13px 14px;text-align:left}
.ptop{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.ptop b{color:#fff;font-family:'Plus Jakarta Sans';font-size:14px}
.ptop span{font-size:11px;color:#7B3FFF;font-weight:700;background:rgba(123,63,255,.15);padding:3px 9px;border-radius:99px}
.pplayer{aspect-ratio:16/9;border-radius:11px;background:linear-gradient(135deg,#1c1c44,#0d0d24);position:relative;display:grid;place-items:center;margin-bottom:12px}
.pp-play{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.92);display:grid;place-items:center}
.pp-play::after{content:"";border-left:12px solid #1b1b3a;border-top:8px solid transparent;border-bottom:8px solid transparent;margin-left:3px}
.pp-tag{position:absolute;left:8px;bottom:8px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:3px 8px;border-radius:6px}
.pi{display:flex;align-items:center;gap:9px;background:#101028;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:9px 11px;margin-bottom:7px}
.pi.on{border-color:rgba(255,101,0,.4)}
.pd{width:17px;height:17px;border-radius:50%;border:1.5px solid #6f6f8a;flex:0 0 17px;display:grid;place-items:center;font-size:10px;color:#062b12}
.pd.done{background:#2ED573;border-color:#2ED573}
.pt{color:#e7e7f2;font-size:12px;font-weight:600;line-height:1.2}
.pt small{display:block;color:#8a8aa5;font-size:10px;font-weight:500}
.pbar{height:6px;background:#15153A;border-radius:99px;margin-top:11px;overflow:hidden}
.pbar i{display:block;height:100%;width:32%;background:linear-gradient(90deg,#FF6500,#7B3FFF)}

section{padding:46px 0}
.alt{background:var(--fundo)}
h2.tit{font-size:28px;font-weight:800;letter-spacing:-.4px;text-align:center;max-width:640px;margin:0 auto 14px}
.lead{font-size:17px;color:var(--cinza);text-align:center;max-width:600px;margin:0 auto}

.dentro{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:30px}
.dcard{background:#fff;border:1px solid var(--linha);border-radius:15px;padding:22px;text-align:center}
.dcard .em{font-size:30px;margin-bottom:10px}
.dcard h3{font-size:16px;font-weight:700;margin-bottom:6px}
.dcard p{font-size:13.5px;color:var(--cinza);margin:0}

.dor p{font-size:17.5px;text-align:center;max-width:620px;margin:0 auto 14px}
.dor strong{color:var(--vermelho)}

.virada{max-width:560px;margin:26px auto 0}
.virada .l{display:flex;gap:12px;align-items:flex-start;font-size:16.5px;padding:11px 0;border-bottom:1px solid var(--linha)}
.virada .l:last-child{border:0}
.virada .l .s{font-weight:800;flex:0 0 22px;font-size:18px}
.virada .l.sim .s{color:var(--verde)}.virada .l.nao .s{color:#C2C8D2}
.virada .l.nao{color:var(--cinza)}

.matgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:28px}
.matgrid img{width:100%;border-radius:12px;box-shadow:0 8px 22px rgba(14,26,43,.12);display:block;background:#fff}
@media(max-width:760px){.matgrid{grid-template-columns:1fr 1fr}}

/* PLANOS empilhados */
.planos{max-width:460px;margin:32px auto 0;display:flex;flex-direction:column;gap:20px}
.plano{background:#fff;border:2px solid var(--linha);border-radius:22px;padding:28px;position:relative}
.plano.dest{border-color:var(--azul);box-shadow:0 20px 50px rgba(37,99,235,.16)}
.selo{position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:var(--azul);color:#fff;font-size:12px;font-weight:800;padding:6px 18px;border-radius:99px;white-space:nowrap;font-family:'Plus Jakarta Sans';letter-spacing:.4px}
.plano h3{font-size:21px;font-weight:800;text-align:center}
.plano .pdesc{font-size:13.5px;color:var(--cinza);margin:6px 0 16px;text-align:center}
.pre{text-align:center;margin-bottom:4px}
.pre .de{font-size:15px;color:var(--cinza);text-decoration:line-through;display:block}
.pre .por{font-size:44px;font-weight:800;font-family:'Plus Jakarta Sans';letter-spacing:-1.5px}
.pre .por small{font-size:20px}
.parc{font-size:13.5px;color:var(--cinza);text-align:center;margin:2px 0 20px}
.itens{list-style:none;padding:0;margin:0 0 22px}
.itens li{display:flex;gap:9px;font-size:14.5px;padding:7px 0;align-items:flex-start}
.itens li .v{color:var(--verde);font-weight:800;flex:0 0 16px}
.itens li.off{color:#AAB2C0}.itens li.off .v{color:#CDD3DD}
.bp{display:block;width:100%;text-align:center;text-decoration:none;font-family:'Plus Jakarta Sans';font-weight:800;font-size:16px;padding:17px;border-radius:999px;cursor:pointer;border:0}
.bp.b1{background:#fff;border:2px solid var(--azul);color:var(--azul)}
.bp.b2{background:var(--verde);color:#fff;box-shadow:0 10px 24px rgba(22,163,74,.3)}

/* MODAL condição especial */
.ov{position:fixed;inset:0;background:rgba(8,12,24,.72);backdrop-filter:blur(3px);z-index:100;display:none;align-items:center;justify-content:center;padding:18px}
.ov.show{display:flex}
.modal{background:#fff;border-radius:24px;max-width:420px;width:100%;padding:30px 26px;text-align:center;position:relative;animation:pop .25s ease}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal .x{position:absolute;top:14px;right:16px;font-size:22px;color:#9AA3B5;cursor:pointer;line-height:1;background:none;border:0}
.modal .ei{font-size:13px;font-weight:800;color:var(--vermelho);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.modal h3{font-size:23px;font-weight:800;margin-bottom:10px;line-height:1.2}
.modal .mp{margin:14px 0 4px}
.modal .mp .de{font-size:15px;color:var(--cinza);text-decoration:line-through}
.modal .mp .por{font-size:42px;font-weight:800;font-family:'Plus Jakarta Sans';color:var(--tinta);letter-spacing:-1px}
.modal .mp .por small{font-size:19px}
.modal .mparc{font-size:13px;color:var(--cinza);margin-bottom:16px}
.modal .mitens{list-style:none;padding:0;margin:0 0 22px;text-align:left}
.modal .mitens li{display:flex;gap:8px;font-size:14px;padding:5px 0}
.modal .mitens li .v{color:var(--verde);font-weight:800}
.modal .seguir{display:inline-block;margin-top:14px;font-size:13.5px;color:var(--cinza);text-decoration:underline;cursor:pointer}

.gar{background:#fff;border:1px solid var(--linha);border-radius:18px;padding:28px;display:flex;gap:20px;align-items:center;margin-top:14px;max-width:640px;margin-left:auto;margin-right:auto}
.gar .e{flex:0 0 64px;height:64px;border-radius:50%;background:#EAF7EE;display:grid;place-items:center;font-size:30px}
.gar h3{font-size:19px;font-weight:800;margin-bottom:5px}
.gar p{font-size:14.5px;color:var(--cinza);margin:0}

.deps{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:24px}
.dep{background:#fff;border:1px solid var(--linha);border-radius:14px;padding:18px}
.dep .top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.dep .av{width:38px;height:38px;border-radius:50%;background:var(--azul);color:#fff;display:grid;place-items:center;font-weight:800}
.dep .nm{font-weight:700;font-size:14px;line-height:1.2}
.dep .vf{font-size:11px;color:var(--verde);font-weight:600}
.dep .st{color:#FFB400;font-size:13px;margin-bottom:6px}
.dep p{font-size:14px;margin:0}

.faq{margin-top:22px;max-width:680px;margin-left:auto;margin-right:auto}
.q{background:#fff;border:1px solid var(--linha);border-radius:12px;margin-bottom:10px;overflow:hidden}
.q summary{cursor:pointer;padding:16px 18px;font-weight:700;font-size:15px;list-style:none;display:flex;justify-content:space-between;gap:12px;align-items:center}
.q summary::-webkit-details-marker{display:none}
.q summary::after{content:"+";font-size:21px;color:var(--azul);font-weight:700}
.q[open] summary::after{content:"–"}
.q .a{padding:0 18px 16px;font-size:14px;color:var(--cinza)}

.final{background:linear-gradient(135deg,var(--azul),var(--azul-esc));border-radius:22px;padding:46px 26px;text-align:center;color:#fff;margin:8px 0}
.final h2{font-size:28px;font-weight:800;color:#fff;max-width:560px;margin:0 auto 12px}
.final p{color:#D6E2FF;font-size:16.5px;max-width:480px;margin:0 auto 20px}
.final .pp{color:#fff;font-size:15px;margin-bottom:18px}.final .pp b{font-size:26px;font-family:'Plus Jakarta Sans'}
.final .cta{background:#fff;color:var(--verde)}

<script>
function tick(){
  const n=new Date(), f=new Date(); f.setHours(23,59,59,999);
  let s=Math.max(0,Math.floor((f-n)/1000));
  const h=String(Math.floor(s/3600)).padStart(2,'0'); s%=3600;
  const m=String(Math.floor(s/60)).padStart(2,'0'); const ss=String(s%60).padStart(2,'0');
  const el=document.getElementById('cd'); if(el) el.textContent=h+':'+m+':'+ss;
}
tick(); setInterval(tick,1000);

function abrirEspecial(){ document.getElementById('ov').classList.add('show'); document.body.style.overflow='hidden'; }
function fecharEspecial(){ document.getElementById('ov').classList.remove('show'); document.body.style.overflow=''; }
document.getElementById('ov').addEventListener('click',function(e){ if(e.target===this) fecharEspecial(); });

const nomes=["Rafaela","Lucas","Beatriz","João","Mariana","Pedro","Ana","Gabriel"];
const pop=document.getElementById('pop'), popn=document.getElementById('popn');
let i=0;
function showPop(){ popn.textContent=nomes[i%nomes.length]; i++; pop.classList.add('show'); setTimeout(function(){pop.classList.remove('show');},4500); }
setTimeout(function loop(){ showPop(); setTimeout(loop,12000); },6000);
</script>

<style>
:root{
  --bg:#0A0A1F; --panel:#101028; --panel-2:#15153A; --line:rgba(255,255,255,.08);
  --txt:#F5F5FA; --muted:#9A9AB5; --orange:#FF6500; --purple:#7B3FFF; --green:#2ED573;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--bg); color:var(--txt);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit}
button{font-family:inherit}

/* ---------- TOPO ---------- */
.topbar{
  position:sticky; top:0; z-index:30;
  display:flex; align-items:center; gap:18px;
  padding:14px 22px; background:rgba(10,10,31,.85); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.logo{font-family:'Fraunces',serif; font-weight:700; font-size:20px; letter-spacing:-.3px; white-space:nowrap}
.logo b{color:var(--orange)}
.search{flex:1; max-width:420px; position:relative}
.search input{
  width:100%; padding:10px 14px 10px 38px; border-radius:11px;
  background:var(--panel-2); border:1px solid var(--line); color:var(--txt); font-size:14px;
}
.search input::placeholder{color:var(--muted)}
.search svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.5}
.topstat{margin-left:auto; display:flex; align-items:center; gap:10px; font-size:13px; color:var(--muted); white-space:nowrap}
.topstat b{color:var(--txt)}
.menu-btn{display:none; background:none; border:0; color:var(--txt); font-size:22px; cursor:pointer}

/* ---------- LAYOUT ---------- */
.shell{display:grid; grid-template-columns:340px 1fr; min-height:calc(100vh - 59px)}

/* ---------- SIDEBAR ---------- */
.side{border-right:1px solid var(--line); padding:18px 14px; overflow-y:auto; max-height:calc(100vh - 59px); position:sticky; top:59px}
.progresso-geral{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:18px}
.progresso-geral .pct{font-family:'Fraunces',serif; font-size:34px; font-weight:700; line-height:1}
.progresso-geral .pct span{font-size:16px; color:var(--muted)}
.progresso-geral small{color:var(--muted); font-size:12px}
.bar{height:7px; border-radius:99px; background:var(--panel-2); margin-top:10px; overflow:hidden}
.bar i{display:block; height:100%; background:linear-gradient(90deg,var(--orange),var(--purple)); border-radius:99px; transition:width .4s}

.materia{margin-bottom:6px}
.materia-h{
  display:flex; align-items:center; gap:11px; width:100%; text-align:left;
  background:none; border:0; color:var(--txt); padding:11px 10px; border-radius:10px; cursor:pointer; font-size:14.5px; font-weight:600;
}
.materia-h:hover{background:var(--panel)}
.materia-h .ic{font-size:17px}
.materia-h .mini{margin-left:auto; font-size:11px; color:var(--muted); font-weight:500}
.materia-h .chev{transition:transform .25s; opacity:.6}
.materia.open .chev{transform:rotate(90deg)}
.aulas{display:none; padding:2px 0 8px 4px}
.materia.open .aulas{display:block}
.aula{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left;
  background:none; border:0; color:var(--muted); padding:9px 10px 9px 14px; border-radius:9px; cursor:pointer; font-size:13.5px; line-height:1.35;
}
.aula:hover{background:var(--panel); color:var(--txt)}
.aula.ativa{background:var(--panel-2); color:var(--txt)}
.aula.ativa::before{content:""; position:absolute; left:0; width:3px; height:20px; background:var(--orange); border-radius:9px}
.aula{position:relative}
.dot{width:16px; height:16px; flex:0 0 16px; border-radius:50%; border:1.5px solid var(--muted); display:grid; place-items:center; margin-top:1px}
.aula.feito .dot{background:var(--green); border-color:var(--green)}
.aula.feito .dot svg{display:block}
.dot svg{display:none; width:9px; height:9px}
.aula .meta{display:block; font-size:11px; color:#6f6f8a; margin-top:2px}

/* ---------- PALCO ---------- */
.stage{padding:26px 30px 60px; max-width:1000px; margin:0 auto; width:100%}
.player{
  width:100%; aspect-ratio:16/9; background:#000; border-radius:16px; overflow:hidden;
  border:1px solid var(--line); box-shadow:0 20px 60px rgba(0,0,0,.455);
}
.player iframe{width:100%; height:100%; border:0; display:block}
.player .vazio{
  width:100%; height:100%; display:grid; place-content:center; place-items:center; gap:12px; text-align:center; padding:24px;
  background:radial-gradient(120% 120% at 50% 0%, #1a1a40 0%, #0d0d24 70%);
}
.player .vazio .em{font-size:42px}
.player .vazio b{font-size:16px}
.player .vazio small{color:var(--muted); max-width:360px; line-height:1.5}

.now{display:flex; align-items:flex-start; gap:16px; margin-top:22px; flex-wrap:wrap}
.now h1{font-family:'Fraunces',serif; font-weight:600; font-size:26px; line-height:1.2; margin:0; flex:1; min-width:240px}
.now .tags{display:flex; gap:8px; align-items:center; color:var(--muted); font-size:13px; margin-top:7px}
.chip{background:var(--panel-2); border:1px solid var(--line); padding:3px 10px; border-radius:99px; font-size:12px}
.btn-feito{
  display:inline-flex; align-items:center; gap:8px; padding:11px 18px; border-radius:12px; cursor:pointer; font-weight:600; font-size:14px;
  background:var(--orange); color:#1a0e00; border:0; white-space:nowrap;
}
.btn-feito.on{background:transparent; color:var(--green); border:1px solid var(--green)}

.proximas{margin-top:34px}
.proximas h2{font-size:14px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); font-weight:600; margin:0 0 14px}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px}
.card{
  text-align:left; background:var(--panel); border:1px solid var(--line); border-radius:13px; padding:14px; cursor:pointer; color:var(--txt); transition:.18s;
}
.card:hover{transform:translateY(-3px); border-color:rgba(255,101,0,.5)}
.card .thumb{aspect-ratio:16/9; border-radius:9px; background:linear-gradient(135deg,#1c1c44,#101028); display:grid; place-items:center; font-size:26px; margin-bottom:11px}
.card .t{font-size:14px; font-weight:600; line-height:1.3}
.card .s{font-size:12px; color:var(--muted); margin-top:6px}
.card.feito .thumb::after{content:"✓ assistida"; position:absolute}

@media(max-width:880px){
  .shell{grid-template-columns:1fr}
  .side{position:fixed; left:0; top:59px; bottom:0; width:300px; background:var(--bg); z-index:25; transform:translateX(-100%); transition:transform .25s; max-height:none}
  .side.show{transform:none}
  .menu-btn{display:block}
  .search{max-width:none}
  .topstat{display:none}
  .stage{padding:18px}
  .now h1{font-size:21px}
}
.overlay{display:none; position:fixed; inset:59px 0 0; background:rgba(0,0,0,.5); z-index:24}
.overlay.show{display:block}

/* ---------- VITRINE / BOTÃO DESTRAVE ---------- */
.cta-side{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left; margin-bottom:14px;
  background:linear-gradient(135deg,rgba(255,101,0,.16),rgba(123,63,255,.16));
  border:1px solid rgba(255,101,0,.35); color:var(--txt); padding:13px 12px; border-radius:12px; cursor:pointer; font-weight:600; font-size:14px;
}
.cta-side:hover{border-color:var(--orange)}
.cta-side .ic{font-size:17px}
.loja-head{margin-bottom:8px}
.loja-head h1{font-family:'Fraunces',serif; font-weight:600; font-size:26px; margin:0 0 6px}
.loja-head p{color:var(--muted); margin:0; font-size:14px; line-height:1.5; max-width:560px}
.loja-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; margin-top:24px}
.prod{
  position:relative; background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:20px; display:flex; flex-direction:column; gap:10px;
  transition:.2s;
}
.prod:hover{transform:translateY(-3px); border-color:rgba(123,63,255,.55)}
.prod .lock{position:absolute; top:16px; right:16px; font-size:16px; opacity:.7}
.prod h3{font-family:'Fraunces',serif; font-weight:600; font-size:19px; margin:0; padding-right:24px; line-height:1.2}
.prod .pr{color:var(--muted); font-size:14px; line-height:1.5; flex:1}
.prod .preco{font-size:22px; font-weight:800; color:var(--txt)}
.prod .preco small{font-size:13px; color:var(--muted); font-weight:500}
.prod .desbloquear{
  display:flex; align-items:center; justify-content:center; gap:8px; text-decoration:none;
  background:var(--orange); color:#1a0e00; font-weight:700; font-size:14px; padding:12px; border-radius:11px; transition:.15s;
}
.prod .desbloquear:hover{filter:brightness(1.08)}
.prod.sem-link .desbloquear{background:var(--panel-2); color:var(--muted); cursor:default}
</style>
</head>
<body>

<header class="topbar">
  <button class="menu-btn" onclick="toggleSide()">☰</button>
  <div class="logo">Método <b>Pro</b> do ENEM</div>
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
    <input id="busca" type="text" placeholder="Buscar aula..." oninput="filtrar(this.value)">
  </div>
  <div class="topstat"><span>Seu progresso:</span> <b id="topPct">0%</b></div>
</header>

<div class="shell">
  <aside class="side" id="side">
    <div class="progresso-geral">
      <div class="pct"><span id="feitas">0</span><span>/<span id="total">0</span> aulas</span></div>
      <small>Você está montando seu caminho até o ENEM</small>

      </div>

        <span id="btnFeitoTxt">Marcar como assistida</span>
      </button>

    <section class="proximas">
      <h2 id="tituloModulo">Continue de onde parou</h2>
      <div class="grid" id="grid"></div>
    </section>
  </main>
</div>

<script>
let estado = {};
try { estado = JSON.parse(localStorage.getItem('enem_progresso')||'{}'); } catch(e){ estado = {}; }
let atual = null; // {m, a}

function chave(m,a){ return CURSO.materias[m].id + '_' + a; }
function salvar(){ try{ localStorage.setItem('enem_progresso', JSON.stringify(estado)); }catch(e){} }

function totalAulas(){ return CURSO.materias.reduce((s,m)=>s+m.aulas.length,0); }
function totalFeitas(){ return Object.values(estado).filter(Boolean).length; }
function feitasMateria(m){ return CURSO.materias[m].aulas.filter((_,a)=>estado[chave(m,a)]).length; }

function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = CURSO.materias.map((mt,m)=>`
    <div class="materia ${m===0?'open':''}" data-m="${m}">
      <button class="materia-h" onclick="toggleMateria(${m})">
        <span class="ic">${mt.icone}</span>
        <span>${mt.nome}</span>
        <span class="mini"><span class="fm" data-fm="${m}">${feitasMateria(m)}</span>/${mt.aulas.length}</span>
        <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      </button>
      <div class="aulas">
        ${mt.aulas.map((au,a)=>`
          <button class="aula ${estado[chave(m,a)]?'feito':''}" data-key="${chave(m,a)}" onclick="abrir(${m},${a})">
            <span class="dot"><svg viewBox="0 0 24 24" fill="none" stroke="#062b12" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg></span>
            <span>${au.titulo}<span class="meta">${au.dur} · ${au.canal}</span></span>
          </button>`).join('')}
      </div>
    </div>`).join('');
  atualizarBarras();
}

function atualizarBarras(){
  const t = totalAulas(), f = totalFeitas();
  const pct = t? Math.round(f/t*100):0;
  document.getElementById('feitas').textContent = f;
  document.getElementById('total').textContent = t;
  document.getElementById('barGeral').style.width = pct+'%';
  document.getElementById('topPct').textContent = pct+'%';
  document.querySelectorAll('.fm').forEach(el=>{ el.textContent = feitasMateria(+el.dataset.fm); });
}

function toggleMateria(m){ document.querySelector(`.materia[data-m="${m}"]`).classList.toggle('open'); }

function abrir(m,a){
  atual = {m,a};
  const au = CURSO.materias[m].aulas[a];
  // player
  const p = document.getElementById('player');
  if(au.list && au.list.trim()){
    p.innerHTML = `<iframe src="https://www.youtube.com/embed/videoseries?list=${au.list}&rel=0&modestbranding=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
  } else if(au.yt && au.yt.trim()){
    p.innerHTML = `<iframe src="https://www.youtube.com/embed/${au.yt}?rel=0&modestbranding=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
  } else {
    p.innerHTML = `<div class="vazio"><div class="em">🎬</div><b>Aula aguardando o vídeo</b><small>Cole o ID do YouTube no campo <code>yt</code> desta aula, lá no topo do arquivo.</small></div>`;
  }
  document.getElementById('tituloAula').textContent = au.titulo;
  document.getElementById('tagsAula').innerHTML =
    `<span class="chip">${CURSO.materias[m].nome}</span>${au.list?'<span class="chip" style="background:rgba(123,63,255,.2);border-color:rgba(123,63,255,.5);color:#c9b3ff">📋 PLAYLIST</span>':''}<span>${au.dur}</span><span>·</span><span>${au.canal}</span>`;
  // botão feito
  const b = document.getElementById('btnFeito'); b.style.display='inline-flex';
  setBtn(estado[chave(m,a)]);
  // ativa na sidebar
  document.querySelectorAll('.aula').forEach(el=>el.classList.remove('ativa'));
  const el = document.querySelector(`.aula[data-key="${chave(m,a)}"]`);
  if(el){ el.classList.add('ativa'); el.closest('.materia').classList.add('open'); }
  // proximas do modulo
  renderGrid(m,a);
  document.querySelector('.stage').scrollTo({top:0});
  window.scrollTo({top:0,behavior:'smooth'});
  if(window.innerWidth<=880) fecharSide();
}

function setBtn(on){
  const b=document.getElementById('btnFeito'), t=document.getElementById('btnFeitoTxt');
  b.classList.toggle('on',!!on);
  t.textContent = on? '✓ Assistida' : 'Marcar como assistida';
}

function marcarFeito(){
  if(!atual) return;
  const k = chave(atual.m,atual.a);
  estado[k] = !estado[k]; salvar();
  setBtn(estado[k]);
  const el = document.querySelector(`.aula[data-key="${k}"]`);
  if(el) el.classList.toggle('feito',!!estado[k]);
  atualizarBarras(); renderGrid(atual.m,atual.a);
}

function renderGrid(m,a){
  const mt = CURSO.materias[m];
  document.getElementById('tituloModulo').textContent = 'Mais aulas de ' + mt.nome;
  const g = document.getElementById('grid');
  g.innerHTML = mt.aulas.map((au,i)=> i===a? '' : `
    <button class="card ${estado[chave(m,i)]?'feito':''}" onclick="abrir(${m},${i})">
      <div class="thumb">${estado[chave(m,i)]?'✅':'▶️'}</div>
      <div class="t">${au.titulo}</div>
      <div class="s">${au.dur} · ${au.canal}</div>
    </button>`).join('');
}

function filtrar(q){
  q = q.trim().toLowerCase();
  document.querySelectorAll('.materia').forEach(mat=>{
    let achou=false;
    mat.querySelectorAll('.aula').forEach(au=>{
      const ok = au.textContent.toLowerCase().includes(q);
      au.style.display = ok?'':'none'; if(ok) achou=true;
    });
    mat.style.display = achou?'':'none';
    if(q && achou) mat.classList.add('open');
  });
}

function toggleSide(){ document.getElementById('side').classList.toggle('show'); document.getElementById('overlay').classList.toggle('show'); }
function fecharSide(){ document.getElementById('side').classList.remove('show'); document.getElementById('overlay').classList.remove('show'); }

function abrirLoja(){
  const stage = document.querySelector('.stage');
  stage.innerHTML = `
    <div class="loja-head">
      <h1>Destrave seu próximo nível 🔓</h1>
      <p>Você já tem as aulas. Agora pega o método pronto pra não estudar no escuro — cada protocolo resolve uma dor específica.</p>
    </div>
    <div class="loja-grid">
      ${VITRINE.map(p=>`
        <div class="prod ${p.checkout? '':'sem-link'}">
          <span class="lock">🔒</span>
          <h3>${p.nome}</h3>
          <div class="pr">${p.promessa}</div>
          <div class="preco">${p.preco} <small>à vista</small></div>
          ${p.checkout
            ? `<a class="desbloquear" href="${p.checkout}" target="_blank" rel="noopener">Desbloquear agora →</a>`
            : `<span class="desbloquear">Link em breve</span>`}
        </div>`).join('')}
    </div>
    <button class="btn-feito" style="margin-top:28px; background:var(--panel-2); color:var(--txt)" onclick="voltarAulas()">← Voltar pras aulas</button>
  `;
  window.scrollTo({top:0,behavior:'smooth'});
  if(window.innerWidth<=880) fecharSide();
}

function voltarAulas(){ location.reload(); }

renderNav();
abrir(0,0);
</script>
</body>
</html>

<style>
:root{
  --bg:#0B0617; --bg2:#120A24; --card:#1A1030; --card2:#221540;
  --line:rgba(255,255,255,.09); --txt:#F3EFFA; --muted:#A99FC4;
  --roxo:#7B3FFF; --roxo2:#9D4EFF; --amarelo:#FFD60A; --verde:#2ED573;
  --vermelho:#FF4A4A;
}
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; background:var(--bg); color:var(--txt);
  font-family:'Inter',system-ui,sans-serif; display:flex; align-items:center; justify-content:center; padding:20px;
  background-image: radial-gradient(800px 400px at 50% 0%, rgba(123,63,255,.25), transparent 60%);
  -webkit-font-smoothing:antialiased;
}
.login-box{
  width:100%; max-width:400px; background:var(--card); border:1px solid var(--line); border-radius:20px;
  padding:40px 30px; box-shadow:0 20px 50px rgba(0,0,0,.5);
}
.logo{
  font-family:'Plus Jakarta Sans'; font-weight:800; font-size:24px; text-align:center; margin-bottom:8px; letter-spacing:-.5px;
}
.logo b{color:var(--roxo2)}
.subtitle{
  color:var(--muted); font-size:14px; text-align:center; margin-bottom:32px;
}
.form-group{
  margin-bottom:20px;
}
.form-group label{
  display:block; font-size:13px; color:var(--muted); margin-bottom:8px; font-weight:500;
}
.form-group input{
  width:100%; background:var(--bg2); border:1px solid var(--line); border-radius:10px; padding:12px 16px;
  color:#fff; font-family:inherit; font-size:15px; outline:none; transition:border-color .2s;
}
.form-group input:focus{
  border-color:var(--roxo2);
}
.btn-login{
  width:100%; background:var(--roxo); color:#fff; font-family:'Plus Jakarta Sans'; font-weight:800;
  font-size:15px; padding:14px; border:0; border-radius:10px; cursor:pointer; transition:background .2s; margin-top:10px;
}
.btn-login:hover{
  background:var(--roxo2);
}
.err-msg{
  background:rgba(255,74,74,.1); border:1px solid rgba(255,74,74,.3); color:var(--vermelho);
  padding:12px; border-radius:8px; font-size:13px; margin-bottom:20px; display:none; text-align:center;
}
</style>
</head>
<body>

<div class="login-box">
  <div class="logo">Pro do <b>ENEM</b></div>
  <div class="subtitle">Faça login para acessar a área de aulas</div>

  <div class="err-msg" id="errMsg">Email ou senha incorretos</div>

  <form id="loginForm">
    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" required placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn-login" id="btnSubmit">Entrar</button>
  </form>
</div>

<script>
// Inicialização do Supabase Client (substitua PROJECT_URL e ANON_KEY pelos valores reais)
const supabase = window.supabase.createClient('PROJECT_URL', 'ANON_KEY');

const form = document.getElementById('loginForm');
const errMsg = document.getElementById('errMsg');
const btnSubmit = document.getElementById('btnSubmit');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errMsg.style.display = 'none';
  btnSubmit.disabled = true;
  btnSubmit.textContent = 'Carregando...';

  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;

  try {
    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: senha
    });

    if (error) {
      throw error;
    }

    // Login com sucesso, redireciona para a plataforma
    window.location.href = '/plataforma/';
  } catch (err) {
    console.error(err);
    errMsg.style.display = 'block';
    btnSubmit.disabled = false;
    btnSubmit.textContent = 'Entrar';
  }
});

// Verifica se já está logado para redirecionar direto
async function checkLoggedIn() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    window.location.href = '/plataforma/';
  }
}
checkLoggedIn();
</script>

</body>
</html>
